<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feedback - ReviewLab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container py-5">



  <h2 class="text-center mb-4">Feedback del Proyecto 💬</h2>



  <div class="card p-4 mb-4">
    <h4 id="projectTitle">Nombre del Proyecto</h4>
    <p id="projectDescription">
      Descripción breve del proyecto donde los usuarios podrán dejar su opinión.
    </p>
  </div>



  <div class="card p-4 mb-4">
    <h5>Deja tu feedback</h5>


<form id="feedbackForm">

 
  <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input type="text" id="user" class="form-control" placeholder="Tu nombre">
  </div>


  <div class="mb-3">
    <label class="form-label">Calificación</label>
    <select id="rating" class="form-control">
      <option value="">Selecciona una opción</option>
      <option value="5">⭐⭐⭐⭐⭐ Excelente</option>
      <option value="4">⭐⭐⭐⭐ Bueno</option>
      <option value="3">⭐⭐⭐ Regular</option>
      <option value="2">⭐⭐ Malo</option>
      <option value="1">⭐ Muy malo</option>
    </select>
  </div>

  
  <div class="mb-3">
    <label class="form-label">Comentario</label>
    <textarea id="comment" class="form-control" rows="3" placeholder="Escribe tu opinión..."></textarea>
  </div>

  
  <button type="submit" class="btn btn-main w-100">
    Enviar feedback
  </button>

</form>


  </div>

  <!-- Lista de comentarios -->

  <div class="card p-4">
    <h5>Comentarios</h5>


<div id="commentsList">
  <!-- Aquí se insertarán los comentarios dinámicamente -->
</div>


  </div>

</div>
<script src="./backend/js/script.js"></script>
</body>
</html>
